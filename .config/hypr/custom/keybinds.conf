# See https://wiki.hyprland.org/Configuring/Binds/
#!
##! User
bind = Ctrl+Super, Slash, exec, xdg-open ~/.config/illogical-impulse/config.json # Edit shell config
bind = Ctrl+Super+Alt, Slash, exec, xdg-open ~/.config/hypr/custom/keybinds.conf # Edit extra keybinds

# Rebinds
unbind = Ctrl+Super, T
unbind = Super, V
unbind = Super, Period
bind = Ctrl+Super, T, exec, ~/.config/quickshell/$qsConfig/scripts/colors/switchwall.sh # [hidden]
unbind = Super+Alt, code:10
unbind = Super+Alt, code:11
unbind = Super+Alt, code:12
unbind = Super+Alt, code:13
unbind = Super+Alt, code:14
unbind = Super+Alt, code:15
unbind = Super+Alt, code:16
unbind = Super+Alt, code:17
unbind = Super+Alt, code:18
unbind = Super+Alt, code:19
unbind = Super+Alt, code:87
unbind = Super+Alt, code:88
unbind = Super+Alt, code:89
unbind = Super+Alt, code:83
unbind = Super+Alt, code:84
unbind = Super+Alt, code:85
unbind = Super+Alt, code:79
unbind = Super+Alt, code:80
unbind = Super+Alt, code:81
unbind = Super+Alt, code:90
unbind = Super+Alt, S
unbind = Super, S

bind = Super+Shift, code:10, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1 # [hidden]
bind = Super+Shift, code:11, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2 # [hidden]
bind = Super+Shift, code:12, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3 # [hidden]
bind = Super+Shift, code:13, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4 # [hidden]
bind = Super+Shift, code:14, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5 # [hidden]
bind = Super+Shift, code:15, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6 # [hidden]
bind = Super+Shift, code:16, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7 # [hidden]
bind = Super+Shift, code:17, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8 # [hidden]
bind = Super+Shift, code:18, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9 # [hidden]
bind = Super+Shift, code:19, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]
bind = Super+Shift, code:87, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 1  # [hidden]
bind = Super+Shift, code:88, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 2  # [hidden]
bind = Super+Shift, code:89, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 3  # [hidden]
bind = Super+Shift, code:83, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 4  # [hidden]
bind = Super+Shift, code:84, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 5  # [hidden]
bind = Super+Shift, code:85, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 6  # [hidden]
bind = Super+Shift, code:79, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 7  # [hidden]
bind = Super+Shift, code:80, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 8  # [hidden]
bind = Super+Shift, code:81, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 9  # [hidden]
bind = Super+Shift, code:90, exec, ~/.config/hypr/hyprland/scripts/workspace_action.sh movetoworkspacesilent 10 # [hidden]
bind = Super+Shift, Grave, movetoworkspacesilent, special # [hidden]
bind = Super, Grave, togglespecialworkspace

# Add stuff here
# Use #! to add an extra column on the cheatsheet
# Use ##! to add a section in that column
# Add a comment after a bind to add a description, like above

##! Utilities
bind = Super, Period, exec, BEMOJI_PICKER_CMD="rofi -dmenu" bemoji -t -n -c # Open Emote
bind = Super, V, exec, copyq show # Open CopyQ
bind = Alt, Space, exec, fuzzel # Fuzzel

## Screenshot
bind = Ctrl, Print, exec, hyprshot -m region -z # Screenshot region
bind = Ctrl+Shift, Print, exec, hyprshot -m output -m active # Screenshot active monitor
bind = Alt, Print, exec, hyprshot -m window -m active # Screenshot active window
