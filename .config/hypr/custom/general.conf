# Put general config stuff here
# Here's a list of every variable: https://wiki.hyprland.org/Configuring/Variables/

debug {
	disable_logs = false
}

cursor {
	no_hardware_cursors = false
}

input {
	sensitivity = 0.1
	accel_profile = flat
	touchpad {
		scroll_factor = 0.2
	}
}

decoration {
    rounding = 18

    blur {
        enabled = true
        xray = false
        new_optimizations = true
        size = 2
        passes = 2
        brightness = 1
        noise = 0
        contrast = 2
        vibrancy = 0
        vibrancy_darkness = 0
        popups = false
        popups_ignorealpha = 0.6
        input_methods = true
        input_methods_ignorealpha = 0.8
    	special = false
    }
}

misc {
	middle_click_paste = false
}
