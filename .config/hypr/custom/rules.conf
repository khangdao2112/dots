# You can put custom rules here
# Window/layer rules: https://wiki.hyprland.org/Configuring/Window-Rules/
# Workspace rules: https://wiki.hyprland.org/Configuring/Workspace-Rules/

# Re-enable blur for all windows
windowrule = match:class .*, no_blur off

# Desktop Gremlins
windowrule = no_blur on, no_shadow on, border_size 0, match:title ilgwg_desktop_gremlins.py

# VSCode
windowrule = opacity 0.9 override 0.95 override, match:class code

# Kitty
windowrule = opacity 0.9 override 0.95 override, match:class ^kitty$

# Pear
windowrule = opacity 0.85 override 0.95 override, match:class com.github.th_ch.youtube_music

# Vesktop
windowrule = workspace 2 silent, match:class vesktop

# Steam
windowrule = float on, match:class steam

# copyq
windowrule = opacity 0.85 override 0.95, float on center , match:class com.github.hluk.copyq

# edex
windowrule = opacity 0.85 override 0.95, match:class eDEX-UI

# Spotify
windowrule = opacity 0.85 override 0.95, match:class spotify

# Overrides
windowrule = match:class ^(hyprland-share-picker)(.*)$, float on

# Special workspace
workspace = special:special, gapsout:50
