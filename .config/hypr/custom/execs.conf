# You can make apps auto-start here
# Relevant Hyprland wiki section: https://wiki.hyprland.org/Configuring/Keywords/#executing

# Apps
exec-once = fcitx5 -d
exec-once = steam -silent &
exec-once = hyprshell run &

# Bluetooth
exec-once = bluetooth-autoconnect

# CopyQ
exec-once = copyq &

# Set cursor theme and size
exec-once = hyprctl setcursor $HYPRCURSOR_THEME $HYPRCURSOR_SIZE

# Vesktop
exec-once = sleep 2 && vesktop --enable-blink-features=MiddleClickAutoscroll &

# Legion GUI
exec-once = legion_gui --use_legion_cli_to_write

# OTD
exec-once = systemctl --user start opentabletdriver.service --now